<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px 20px; background: var(--bg-0); display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .cell { border: 1px solid var(--rule); padding: 10px; display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .cell img { width: 100%; height: auto; max-height: 140px; }
  .cap { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); letter-spacing: 0.14em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="cell"><img src="../assets/illustrations/orbit.svg" alt=""><div class="cap">orbit</div></div>
  <div class="cell"><img src="../assets/illustrations/target.svg" alt=""><div class="cap">target</div></div>
  <div class="cell"><img src="../assets/illustrations/horizon.svg" alt=""><div class="cap">horizon</div></div>
  <div class="cell"><img src="../assets/illustrations/signal.svg" alt=""><div class="cap">signal</div></div>
</body>
</html>
