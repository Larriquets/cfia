<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px 20px; background: var(--bg-0); }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .block { border: 1px solid var(--rule); padding: 12px; display: flex; flex-direction: column; gap: 6px; min-height: 96px; }
  .chip { width: 100%; height: 28px; }
  .name { font-family: var(--font-display); font-size: 14px; color: var(--fg-0); }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); }
  .use { font-family: var(--font-sans); font-size: 12px; color: var(--fg-1); }
</style>
</head>
<body>
  <div class="grid">
    <div class="block"><div class="chip" style="background:#e85a5a"></div><div class="name">danger</div><div class="hex">#e85a5a</div><div class="use">Error · destructive</div></div>
    <div class="block"><div class="chip" style="background:#6ac28f"></div><div class="name">success</div><div class="hex">#6ac28f</div><div class="use">Confirmación</div></div>
    <div class="block"><div class="chip" style="background:#8ab4d6"></div><div class="name">info</div><div class="hex">#8ab4d6</div><div class="use">Aviso · nota</div></div>
  </div>
</body>
</html>
