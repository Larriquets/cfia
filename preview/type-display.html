<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); margin: 0; }
  .row { display: flex; gap: 28px; align-items: center; }
  .termmark {
    display: inline-flex; align-items: center;
    font-family: var(--font-mono); font-size: 48px; font-weight: 500;
    color: var(--fg-0); letter-spacing: -0.02em; line-height: 1;
  }
  .termmark .gt { color: var(--accent); margin-right: 10px; }
  .termmark .cur {
    display: inline-block; width: 22px; height: 38px;
    background: var(--fg-0); margin-left: 8px;
    animation: blink 1.1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .divider { width: 1px; height: 64px; background: var(--rule); }
  .stack { display: flex; flex-direction: column; gap: 4px; }
  .big {
    font-family: var(--font-display); font-size: 26px; font-weight: 500;
    color: var(--fg-0); letter-spacing: -0.02em; line-height: 1.1;
  }
  .sub {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.22em;
    color: var(--fg-1); text-transform: uppercase;
  }
  .spec-row { display: flex; align-items: baseline; gap: 18px; margin-top: 2px; }
  .spec-label {
    font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.14em;
    color: var(--fg-2); text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="row">
    <div class="termmark"><span class="gt">&gt;</span>cfia<span class="cur"></span></div>
    <div class="divider"></div>
    <div class="stack">
      <div class="big">Cuentos de Ficción de IA</div>
      <div class="sub">ESCRITOS POR MÁQUINAS</div>
      <div class="spec-row">
        <span class="spec-label">LOGOMARK · JETBRAINS MONO</span>
        <span class="spec-label">WORDMARK · SPACE GROTESK</span>
      </div>
    </div>
  </div>
</body>
</html>
