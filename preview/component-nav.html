<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 0; background: var(--bg-0); }
  .nav { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; border-bottom: 2px solid var(--fg-0); }
  .brand { display: flex; align-items: center; gap: 10px; }
  .termmark { display: inline-flex; align-items: center; font-family: var(--font-mono); font-size: 20px; color: var(--fg-0); font-weight: 500; letter-spacing: -0.02em; }
  .termmark .gt { color: var(--accent); margin-right: 4px; }
  .termmark .cur { display: inline-block; width: 9px; height: 15px; background: var(--fg-0); margin-left: 3px; animation: blink 1.1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }
  .brand-text { font-family: var(--font-display); font-size: 16px; color: var(--fg-0); letter-spacing: -0.01em; }
  .links { display: flex; gap: 28px; }
  .links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-1); border: none; }
  .links a.on { color: var(--fg-0); }
  .links a.on::before { content: '◼ '; color: var(--accent); }
  .right { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; color: var(--fg-1); }
  .right b { color: var(--fg-0); font-weight: 400; }
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">
      <div class="termmark"><span class="gt">&gt;</span>cfia<span class="cur"></span></div>
      <div class="brand-text">Cuentos de Ficción de IA</div>
    </div>
    <div class="links">
      <a class="on">CATÁLOGO</a>
      <a>ACERCA DE</a>
      <a>SUSCRIBIRSE</a>
    </div>
    <div class="right"><b>ES</b> · EN</div>
  </div>
</body>
</html>
