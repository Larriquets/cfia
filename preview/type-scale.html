<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .row .label { min-width: 120px; color: var(--fg-2); }
  .sample { font-family: var(--font-display); color: var(--fg-0); letter-spacing: -0.02em; line-height: 1; font-weight: 500; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="label">H1 · 56</div><div class="sample" style="font-size: 56px;">El silencio de Marte</div></div>
    <div class="row"><div class="label">H2 · 40</div><div class="sample" style="font-size: 40px;">Capítulo primero</div></div>
    <div class="row"><div class="label">H3 · 28</div><div class="sample" style="font-size: 28px;">Transmisión entrante</div></div>
    <div class="row"><div class="label">H4 · 22</div><div class="sample" style="font-size: 22px;">Subtítulo</div></div>
  </div>
</body>
</html>
