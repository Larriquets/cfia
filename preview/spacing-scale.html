<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); }
  .row { display: flex; align-items: flex-end; gap: 10px; }
  .unit { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .box { background: var(--accent); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-1); letter-spacing: 0.1em; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-0); }
</style>
</head>
<body>
  <div class="row">
    <div class="unit"><div class="box" style="width:4px;height:40px"></div><div class="label">1</div><div class="px">4</div></div>
    <div class="unit"><div class="box" style="width:8px;height:40px"></div><div class="label">2</div><div class="px">8</div></div>
    <div class="unit"><div class="box" style="width:12px;height:40px"></div><div class="label">3</div><div class="px">12</div></div>
    <div class="unit"><div class="box" style="width:16px;height:40px"></div><div class="label">4</div><div class="px">16</div></div>
    <div class="unit"><div class="box" style="width:24px;height:40px"></div><div class="label">5</div><div class="px">24</div></div>
    <div class="unit"><div class="box" style="width:32px;height:40px"></div><div class="label">6</div><div class="px">32</div></div>
    <div class="unit"><div class="box" style="width:48px;height:40px"></div><div class="label">7</div><div class="px">48</div></div>
    <div class="unit"><div class="box" style="width:64px;height:40px"></div><div class="label">8</div><div class="px">64</div></div>
    <div class="unit"><div class="box" style="width:96px;height:40px"></div><div class="label">9</div><div class="px">96</div></div>
  </div>
</body>
</html>
