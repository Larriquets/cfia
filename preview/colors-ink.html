<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 16px 20px; background: var(--bg-0); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: center; gap: 16px; }
  .chip { width: 28px; height: 28px; border: 1px solid var(--rule); }
  .name { font-family: var(--font-display); font-size: 15px; color: var(--fg-0); min-width: 90px; letter-spacing: -0.01em; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); min-width: 80px; }
  .sample { font-family: var(--font-sans); font-size: 15px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="chip" style="background:#f5f3ee"></div><div class="name">fg-0</div><div class="hex">#f5f3ee</div><div class="sample" style="color:#f5f3ee">El último humano en la Tierra</div></div>
    <div class="row"><div class="chip" style="background:#b8b5ad"></div><div class="name">fg-1</div><div class="hex">#b8b5ad</div><div class="sample" style="color:#b8b5ad">Metadata · autor · fecha</div></div>
    <div class="row"><div class="chip" style="background:#6b6860"></div><div class="name">fg-2</div><div class="hex">#6b6860</div><div class="sample" style="color:#6b6860">Caption terciario</div></div>
    <div class="row"><div class="chip" style="background:#3a3832"></div><div class="name">fg-3</div><div class="hex">#3a3832</div><div class="sample" style="color:#3a3832">Deshabilitado / placeholder</div></div>
  </div>
</body>
</html>
