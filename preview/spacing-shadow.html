<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px 28px; background: var(--bg-0); }
  .row { display: flex; gap: 28px; align-items: flex-start; }
  .demo { flex: 0 0 auto; }
  .shadow-btn { display: inline-block; padding: 12px 22px; font-family: var(--font-display); font-size: 15px; font-weight: 500; color: var(--fg-0); background: var(--bg-0); border: 2px solid var(--fg-0); box-shadow: 4px 4px 0 var(--fg-0); letter-spacing: -0.01em; }
  .notes { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); letter-spacing: 0.1em; line-height: 1.8; }
  .notes b { color: var(--fg-0); font-weight: 500; }
</style>
</head>
<body>
  <div class="row">
    <div class="demo">
      <div class="shadow-btn">Leer cuento →</div>
    </div>
    <div class="notes">
      <b>SHADOW · 4px 4px 0</b><br>
      ZERO BLUR · ZERO ALPHA<br>
      COLOR: var(--rule-strong)<br>
      ON PRESS: SNAP TO FLAT
    </div>
  </div>
</body>
</html>
