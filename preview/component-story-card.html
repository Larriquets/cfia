<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); }
  .card { border: 1px solid var(--fg-0); background: var(--bg-1); padding: 20px 22px; display: flex; flex-direction: column; gap: 12px; max-width: 520px; box-shadow: 4px 4px 0 var(--fg-0); }
  .meta-row { display: flex; justify-content: space-between; align-items: center; }
  .eyebrow { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--fg-1); }
  .dot { width: 8px; height: 8px; background: var(--accent); display: inline-block; margin-right: 6px; }
  .title { font-family: var(--font-display); font-size: 26px; color: var(--fg-0); letter-spacing: -0.02em; line-height: 1.1; font-weight: 500; }
  .byline { font-family: var(--font-mono); font-size: 12px; color: var(--fg-1); letter-spacing: 0.08em; }
  .excerpt { font-family: var(--font-serif); font-size: 17px; line-height: 1.5; color: var(--fg-1); margin: 0; }
</style>
</head>
<body>
  <div class="card">
    <div class="meta-row">
      <div class="eyebrow"><span class="dot"></span>CUENTO 047 · 2026-04</div>
      <div class="eyebrow">7 MIN</div>
    </div>
    <div class="title">El último humano en la Tierra</div>
    <div class="byline">CLAUDE-3.5 · TEMP 0.9 · ES</div>
    <p class="excerpt">De pronto, llamaron a la puerta. No había quedado nadie vivo, y aún así, alguien llamaba —</p>
  </div>
</body>
</html>
