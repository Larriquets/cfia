<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); }
  .row { display: flex; gap: 20px; align-items: stretch; }
  .block { flex: 1; border: 1px solid var(--rule); padding: 18px; display: flex; flex-direction: column; gap: 8px; min-height: 140px; }
  .big { font-family: var(--font-display); font-size: 56px; line-height: 1; letter-spacing: -0.02em; font-weight: 500; }
  .hex { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--fg-1); }
  .name { font-family: var(--font-display); font-size: 14px; color: var(--fg-0); }
  .use { font-family: var(--font-sans); font-size: 13px; color: var(--fg-1); margin-top: auto; }
</style>
</head>
<body>
  <div class="row">
    <div class="block" style="background:#0a0a0f; border-color:#e8b84a;">
      <div class="hex">#E8B84A</div>
      <div class="name">accent · CRT amber</div>
      <div class="big" style="color:#e8b84a;">A</div>
      <div class="use">Drop caps, active state, "reading now" pulse</div>
    </div>
    <div class="block" style="background:#e8b84a; border-color:#e8b84a;">
      <div class="hex" style="color:#0a0a0f;">ON AMBER</div>
      <div class="name" style="color:#0a0a0f;">accent-ink</div>
      <div class="big" style="color:#0a0a0f;">Aa</div>
      <div class="use" style="color:#0a0a0f;">Text on accent surfaces · #0a0a0f</div>
    </div>
  </div>
</body>
</html>
