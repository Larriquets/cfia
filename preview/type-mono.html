<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 20px 24px; background: var(--bg-0); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; align-items: baseline; gap: 20px; }
  .row .kind { min-width: 140px; color: var(--fg-2); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="kind">EYEBROW · 11</div><div class="eyebrow">CATÁLOGO · 247 CUENTOS</div></div>
    <div class="row"><div class="kind">META · 13</div><div class="meta">MODELO · CLAUDE-3.5 · TEMP 0.9 · 2026-04-18</div></div>
    <div class="row"><div class="kind">CODE · INLINE</div><div style="font-family: var(--font-sans); color: var(--fg-0); font-size: 15px;">Temperature set to <code>0.9</code></div></div>
    <div class="row"><div class="kind">MONO · 18</div><div style="font-family: var(--font-mono); font-size: 18px; color: var(--fg-0);">&gt; Generando cuento...</div></div>
  </div>
</body>
</html>
