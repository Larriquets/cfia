<html lang="en">
<head>

  <div class="grid">
    <div class="label">PROSE · 22</div>
    <div style="font-family: var(--font-serif); font-size: 22px; line-height: 1.7; color: var(--fg-0); max-width: 560px;">
      <span style="font-size: 72px; float: left; line-height: 0.85; padding: 2px 8px 0 0; color: var(--accent); font-family: var(--font-serif);">E</span>l último humano en la Tierra se sentó sólo en una habitación. De pronto, llamaron a la puerta.
    </div>
  </div>

</html>
